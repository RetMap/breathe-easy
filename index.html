<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe Easy | Global Air Quality</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4 font-sans text-slate-900">

    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-8 md:p-12 text-center">
                <h1 class="text-4xl font-black tracking-tight mb-2">Breathe Easy</h1>
                <div id="location-text" class="text-blue-600 font-semibold uppercase tracking-widest text-sm mb-6">Check the air quality anywhere</div>

                <div class="flex flex-col md:flex-row gap-2 mb-8">
                    <input type="text" id="city-input" placeholder="Enter city (e.g. London, Tokyo)" 
                           class="flex-1 px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-blue-500 focus:outline-none transition-all">
                    <button onclick="getAirQuality('search')" 
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-md active:scale-95">
                        Search
                    </button>
                </div>
                
                <div id="time-stamp" class="text-[10px] text-slate-400 uppercase mb-4 hidden">Updated: --</div>

                <div id="aqi-display" class="hidden animate-in fade-in duration-500">
                    <div id="aqi-circle" class="w-40 h-40 rounded-full mx-auto flex flex-col items-center justify-center mb-6 border-[12px] bg-slate-50 transition-all duration-700">
                        <span id="aqi-value" class="text-5xl font-black">--</span>
                        <span class="text-xs uppercase font-bold tracking-tighter text-slate-400">Main AQI</span>
                    </div>
                    
                    <div class="flex items-center justify-center gap-2 mb-3">
                        <h2 id="aqi-status" class="text-3xl font-bold">...</h2>
                        <div id="trend-icon" class="text-2xl"></div>
                    </div>
                    
                    <p id="aqi-desc" class="text-slate-500 max-w-sm mx-auto leading-relaxed mb-10"></p>

                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 border-t border-slate-100 pt-8">
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold uppercase">PM2.5</p><p id="val-pm25" class="text-xl font-bold">--</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold uppercase">PM10</p><p id="val-pm10" class="text-xl font-bold">--</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold uppercase">NO2</p><p id="val-no2" class="text-xl font-bold">--</p></div>
                    </div>
                </div>

                <div id="initial-actions" class="flex flex-col gap-3">
                    <p class="text-slate-400 text-xs">OR</p>
                    <button onclick="getAirQuality('here')" id="detect-btn" class="text-slate-600 font-bold hover:underline">
                        Detect My Current Location
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-lg border border-slate-200">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-sm">Guide</span>
                AQI Reference Scale
            </h3>
            <div class="space-y-3">
                <div class="flex items-center gap-4 p-2 rounded-xl bg-green-50 text-green-800">
                    <span class="font-bold w-16">0-50</span> <span>Healthy: Air quality is satisfactory.</span>
                </div>
                <div class="flex items-center gap-4 p-2 rounded-xl bg-yellow-50 text-yellow-800">
                    <span class="font-bold w-16">51-100</span> <span>Moderate: Acceptable air for most.</span>
                </div>
                <div class="flex items-center gap-4 p-2 rounded-xl bg-red-50 text-red-800">
                    <span class="font-bold w-16">101+</span> <span>Unhealthy: High pollution detected.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_TOKEN = "959c3e711f5d014c57766bebd8e507140b759683";

    async function getAirQuality(type) {
        const input = document.getElementById('city-input');
        const display = document.getElementById('aqi-display');
        const locationText = document.getElementById('location-text');
        const timeStamp = document.getElementById('time-stamp');
        const initialActions = document.getElementById('initial-actions');

        let url = `https://api.waqi.info/feed/here/?token=${API_TOKEN}`;
        if (type === 'search') {
            const city = input.value.trim();
            if (!city) return alert("Please enter a city!");
            url = `https://api.waqi.info/feed/${city}/?token=${API_TOKEN}`;
        }

        locationText.innerText = "Connecting...";
        locationText.className = "text-blue-600 font-semibold uppercase tracking-widest text-sm mb-6";
        
        try {
            const response = await fetch(url);
            const result = await response.json();

            // Check if status is OK and data is a valid number
            if (result.status === "ok" && result.data.aqi !== null && !isNaN(result.data.aqi)) {
                const data = result.data;
                display.classList.remove('hidden');
                initialActions.classList.add('hidden');
                timeStamp.classList.remove('hidden');
                
                locationText.innerText = `Location: ${data.city.name}`;
                timeStamp.innerText = `Measured: ${data.time.s}`;
                document.getElementById('aqi-value').innerText = data.aqi;
                
                document.getElementById('val-pm25').innerText = data.iaqi.pm25?.v || "N/A";
                document.getElementById('val-pm10').innerText = data.iaqi.pm10?.v || "N/A";
                document.getElementById('val-no2').innerText = data.iaqi.no2?.v || "N/A";

                updateUI(data.aqi);
            } else {
                // Handle invalid scores or non-existent stations
                display.classList.add('hidden');
                locationText.innerText = "⚠️ Station data unavailable. Please try a different nearby city.";
                locationText.className = "text-red-500 font-bold text-sm mb-6 bg-red-50 p-4 rounded-xl";
                initialActions.classList.remove('hidden');
            }
        } catch (error) {
            locationText.innerText = "Network Error. Please check your connection.";
        }
    }

    function updateUI(aqi) {
        const circle = document.getElementById('aqi-circle');
        const status = document.getElementById('aqi-status');
        const desc = document.getElementById('aqi-desc');
        const trend = document.getElementById('trend-icon');

        trend.innerHTML = aqi > 100 ? "⚠️" : "🍃";

        if (aqi <= 50) {
            status.innerText = "Healthy";
            status.className = "text-3xl font-bold text-green-600";
            desc.innerText = "The air is clear! Perfect for outdoor activities.";
            circle.style.borderColor = "#22c55e";
        } else if (aqi <= 100) {
            status.innerText = "Moderate";
            status.className = "text-3xl font-bold text-yellow-600";
            desc.innerText = "Air quality is acceptable. No major risk for most people.";
            circle.style.borderColor = "#eab308";
        } else {
            status.innerText = "Poor";
            status.className = "text-3xl font-bold text-red-600";
            desc.innerText = "Air pollution is high. Consider staying indoors.";
            circle.style.borderColor = "#ef4444";
        }
    }
    </script>
</body>
</html>
